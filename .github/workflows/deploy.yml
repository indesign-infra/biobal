name: Deploy to Vercel Production

on:
  push:
    branches:
      - main

# Si se pushea varias veces seguidas, cancela el deploy en curso y corre el último.
concurrency:
  group: vercel-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        # Node 22: `undici@8.5.0` (vía @vercel/blob + qwik-city) usa
        # `markAsUncloneable`, disponible recién en Node 22.4+. En Node 20 el
        # build de cliente falla al cargar vite.config.ts.
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar pnpm
        run: npm install -g pnpm

      - name: Instalar dependencias del proyecto
        run: pnpm install

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: Descargar variables de entorno de Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Compilar el proyecto Qwik
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Desplegar en Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
